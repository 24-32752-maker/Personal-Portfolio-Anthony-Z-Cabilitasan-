<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contact Anthony Z. Cabilitasan." />
    <title>Contact — Professional Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js" defer></script>
  </head>
  <body data-page="contact">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="page">
      <header class="top-bar" aria-label="Site header">
        <p class="site-title">
          <a class="site-title-link" href="index.html">PROFFESIONAL PORTFOLIO</a>
        </p>
        <nav class="main-nav" aria-label="Primary">
          <a class="nav-chip" href="index.html" data-nav="home">Home</a>
          <a class="nav-chip" href="about.html" data-nav="about">About</a>
          <a class="nav-chip" href="experience.html" data-nav="experience">Experience</a>
          <a class="nav-chip" href="projects.html" data-nav="projects">Projects</a>
          <a class="nav-chip" href="contact.html" data-nav="contact">Contact</a>
        </nav>
      </header>

      <main id="main-content" tabindex="-1">
        <section id="contact" class="stack-section" aria-labelledby="contact-label">
          <h1 id="contact-label" class="section-label">CONTACT</h1>

          <div class="wood-panel contact-layout">
            <form id="contact-form" class="contact-form" action="#" method="post">
              <dl class="facts">
                <div class="fact-row fact-row--stack">
                  <dt><label for="email">EMAIL</label></dt>
                  <dd class="fact-stack">
                    <input
                      id="email"
                      name="email"
                      type="email"
                      class="field field--wide field--input"
                      autocomplete="email"
                      placeholder="anthonycabilitasan@example.com"
                      required
                    />
                  </dd>
                </div>
                <div class="fact-row">
                  <dt><label for="phone">PHONE</label></dt>
                  <dd>
                    <input
                      id="phone"
                      name="phone"
                      type="tel"
                      class="field field--wide field--input"
                      autocomplete="tel"
                      placeholder="+1 (555) 010-0199"
                    />
                  </dd>
                </div>
                <div class="fact-row fact-row--stack">
                  <dt><label for="msg">MESSAGE</label></dt>
                  <dd class="fact-stack">
                    <textarea
                      id="msg"
                      name="message"
                      class="field field--wide field--textarea"
                      rows="4"
                      placeholder="Write your message here…"
                      required
                    ></textarea>
                  </dd>
                </div>
              </dl>
              <div class="contact-actions">
                <button type="submit" class="nav-pill nav-pill--block">Send Message</button>
                <p class="fine-print">
                  anthonycabilitasan@gmail.com
                </p>
              </div>
            </form>

            <div class="social-block" aria-labelledby="social-label">
              <p id="social-label" class="side-heading">SOCIAL</p>
              <div class="social-row">
                <a class="social-link field" href="https://www.facebook.com/johncena" rel="noopener noreferrer">FACEBOOK</a>
                <a class="social-link field" href="https://www.instagram.com/jdvance/?hl=en" rel="noopener noreferrer">INSTAGRAM</a>
                <a class="social-link field" href="https://www.youtube.com/@MichaelReeves" rel="noopener noreferrer">YOUTUBE</a>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer-bar">
        <p class="footer-text">© ANTHONY Z CABILITASAN — PROFFESIONAL PORTFOLIO WIREFRAME</p>
      </footer>
    </div>
  </body>
</html>
